<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCU Ticketing - Ingreso</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="barraNavegacion">
        <div class="logoSistema">UCU Ticket</div>
        <div class="datosSesion">
            <span>Simulación de Ingreso</span>
        </div>
    </nav>

    <main class="contenedorPrincipal">
        <section id="pantallaAcceso" class="seccionPantalla activa">
            <div class="tarjetaContenedor">
                <h3 class="tituloTarjeta">Ingresar al sistema</h3>
                <p class="subtitulo">Selecciona un rol para probar el flujo correspondiente (Simulación)</p>
            
                <form onsubmit="simularInicioSesion(event)">
                    <div class="grupoCampo">
                        <label for="correoLogin">Correo Electrónico:</label>
                        <input type="email" id="correoLogin" required placeholder="usuario@ucu.edu.uy">
                    </div>

                    <div class="grupoCampo">
                        <label for="rolSimulado">Simular Rol de Ingreso:</label>
                        <select id="rolSimulado">
                            <option value="usuarioGeneral">Usuario General</option>
                            <option value="funcionarioValidacion">Funcionario </option>
                            <option value="administradorSede">Administrador </option>
                        </select>
                    </div>

                    <button type="submit" class="btnAccion btnBordeaux">Ingresar</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        function simularInicioSesion(event) {
            event.preventDefault();
            const rolElegido = document.getElementById('rolSimulado').value;
            
            // Simular el redireccionamiento según el rol hacia los nuevos archivos, luego cambiar
            if (rolElegido === 'usuarioGeneral') {
                window.location.href = 'usuario.html';
            } else if (rolElegido === 'funcionarioValidacion') {
                window.location.href = 'funcionario.html';
            } else if (rolElegido === 'administradorSede') {
                window.location.href = 'administrador.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCU Ticket - Operativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="barraNavegacion">
        <div class="logoSistema">UCU Ticket</div>
        <div class="datosSesion">
            <span>Validación de Accesos</span>
            <button onclick="window.location.href='index.html'" class="btnCerrarSesion">Salir</button>
        </div>
    </nav>
    
    <main class="contenedorPrincipal">
        <section id="pantallaFuncionarioValidacion" class="seccionPantalla activa">
            <div class="tarjetaContenedor">
                <h3 class="tituloTarjeta">Módulo de Control</h3>
                <p class="subtitulo">Perfil Operativo - Dispositivo Homologado</p>
                
                <div class="infoPerfil">
                    <p><strong>Funcionario Legajo N°:</strong> <span id="legajoFuncionario">LEG-9924</span></p>
                </div>

                <div class="bloqueEscaneo">
                    <p class="instruccion">Ingresa el token dinámico o simula el escaneo de cámara:</p>
                    <input type="text" id="tokenEscaneado" placeholder="Ej: TOKEN-A1B2" class="inputEscaneo">
                    <button onclick="simularValidacion()" class="btnAccion btnVerde">Validar entrada</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        function simularValidacion() {
            const token = document.getElementById('tokenEscaneado').value;
            if(!token) return alert('Ingresa un token válido');
            alert(`Token [${token}] verificado. Estado: CONSUMIDO en BDD.`);
            document.getElementById('tokenEscaneado').value = '';
        }
    </script>
</body>
</html>

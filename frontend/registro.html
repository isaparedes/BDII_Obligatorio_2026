<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCU Ticketing - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="barraNavegacion">
        <div class="logoSistema">UCU Ticket</div>
        <div class="datosSesion">
            <span>Registro de usuario</span>
        </div>
    </nav>

    <main class="contenedorPrincipal">

        <section class="seccionPantalla activa">
            <div class="tarjetaContenedor">
                <h3 class="tituloTarjeta">Crear cuenta</h3>
                <p class="subtitulo">Completá los datos para registrarte</p>

                <form onsubmit="registrarUsuario(event)">

                    <div class="grupoCampo">
                        <label>Mail</label>
                        <input type="email" id="mail" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Contraseña</label>
                        <input type="password" id="contrasena" required>
                    </div>

                    <div class="grupoCampo">
                        <label>País documento</label>
                        <input type="text" id="paisDocumento" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Tipo documento</label>
                        <input type="text" id="tipoDocumento" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Número documento</label>
                        <input type="text" id="numeroDocumento" required>
                    </div>

                    <div class="grupoCampo">
                        <label>País dirección</label>
                        <input type="text" id="paisDireccion" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Localidad</label>
                        <input type="text" id="localidad" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Calle</label>
                        <input type="text" id="calle" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Número calle</label>
                        <input type="text" id="numeroCalle" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Código postal</label>
                        <input type="text" id="codigoPostal" required>
                    </div>

                    <div class="grupoCampo">
                        <label>Teléfonos (separados por coma)</label>
                        <input type="text" id="telefonos" placeholder="099111111,098222222">
                    </div>

                    <div id="mensajeError" style="color:red; display:none;"></div>
                    <div id="mensajeExito" style="color:green; display:none; margin-top:10px;"></div>

                    <button type="submit" class="btnAccion btnBordeaux">
                        Registrarse
                    </button>
                </form>

                <p style="margin-top:10px;">
                    ¿Ya tenés cuenta?
                    <a href="index.html">Iniciar sesión</a>
                </p>
            </div>
        </section>

    </main>

    <script>
        const API_URL = 'http://localhost:5271/api';

        async function registrarUsuario(event) {
            event.preventDefault();

            const mensajeError = document.getElementById('mensajeError');
            const mensajeExito = document.getElementById('mensajeExito');

            mensajeError.style.display = 'none';
            mensajeExito.style.display = 'none';

            const telefonosInput = document.getElementById('telefonos').value;

            const data = {
                mail: document.getElementById('mail').value,
                contrasena: document.getElementById('contrasena').value,
                paisDocumento: document.getElementById('paisDocumento').value,
                tipoDocumento: document.getElementById('tipoDocumento').value,
                numeroDocumento: document.getElementById('numeroDocumento').value,
                paisDireccion: document.getElementById('paisDireccion').value,
                localidad: document.getElementById('localidad').value,
                calle: document.getElementById('calle').value,
                numeroCalle: document.getElementById('numeroCalle').value,
                codigoPostal: document.getElementById('codigoPostal').value,
                telefonos: telefonosInput
                    ? telefonosInput.split(',').map(t => t.trim())
                    : []
            };

            try {
                const response = await fetch(`${API_URL}/usuario/registro/usuario-general`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.text();
                    mensajeError.textContent = error;
                    mensajeError.style.display = 'block';
                    return;
                }

                mensajeExito.textContent = "Usuario registrado correctamente. Redirigiendo al login...";
                mensajeExito.style.display = 'block';

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);

            } catch (error) {
                console.error(error);
                mensajeError.textContent = "Error de conexión con el servidor";
                mensajeError.style.display = 'block';
            }
        }
    </script>

</body>
</html>
